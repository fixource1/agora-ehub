services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: saliksik-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - saliksik
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: saliksik-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - saliksik
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: saliksik-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-saliksik}"
      MYSQL_USER: "${DB_USERNAME:-saliksik}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - saliksik-mysql:/var/lib/mysql
    networks:
      - saliksik
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saliksik-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - saliksik-redis:/data
    networks:
      - saliksik

  node:
    image: node:22-alpine
    container_name: saliksik-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - saliksik
    profiles:
      - dev

  mailpit:
    image: axllent/mailpit:latest
    container_name: saliksik-mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - saliksik
    profiles:
      - dev

networks:
  saliksik:
    driver: bridge

volumes:
  saliksik-mysql:
  saliksik-redis:
