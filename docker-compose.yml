name: AGORA_e-HUB

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: AGORA_e-HUB-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    networks:
      - AGORA_e-HUB
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: AGORA_e-HUB-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - AGORA_e-HUB
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: AGORA_e-HUB-postgres
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-agora_ehub}"
      POSTGRES_USER: "${DB_USERNAME:-agora_ehub}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - AGORA_e-HUB-postgres:/var/lib/postgresql/data
    networks:
      - AGORA_e-HUB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agora_ehub} -d ${DB_DATABASE:-agora_ehub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: AGORA_e-HUB-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - AGORA_e-HUB-redis:/data
    networks:
      - AGORA_e-HUB

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: AGORA_e-HUB-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - AGORA_e-HUB
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  node:
    image: node:22-alpine
    container_name: AGORA_e-HUB-node
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - AGORA_e-HUB
    profiles:
      - dev

  mailpit:
    image: axllent/mailpit:latest
    container_name: AGORA_e-HUB-mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - AGORA_e-HUB
    profiles:
      - dev

networks:
  AGORA_e-HUB:
    driver: bridge

volumes:
  AGORA_e-HUB-postgres:
  AGORA_e-HUB-redis:
