; Full www pool — replaces the image default (partial overrides can drop listen = 9000).
[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data

pm = static
pm.max_children = 60
pm.max_requests = 1000

request_terminate_timeout = 120s
clear_env = no
catch_workers_output = yes
